name: continuous

on:
  push:
    branches: [main, develop]

  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-test-sonar:
    runs-on: ubuntu-latest

    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      TESTINGPLATFORM_TELEMETRY_OPTOUT: 1

      REPORTGENERATOR_LICENSE: ${{ secrets.REPORTGENERATOR_LICENSE }}

      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build Pantry.slnx -c Release --no-restore

      - name: Test (xUnit v3 + MTP coverage)
        run: |
            dotnet test \
            --project ./tests/Pantry.Tests.Component/Pantry.Tests.Component.csproj \
            --no-build \
            -c Release \
            --coverage \
            --coverage-output-format cobertura \
            --coverage-output coverage.cobertura.xml

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"**/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:"OpenCover;Html"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.cs.opencover.reportsPaths=coverage-report/OpenCover.xml
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.head_ref }}
            -Dsonar.pullrequest.base=${{ github.base_ref }}

      - name: Upload test results
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: artifacts/test-results

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-report

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: build-test-sonar

    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore --runtime linux-musl-x64

      - name: Publish
        run: |
          dotnet publish \
            ./src/Pantry.Service/Pantry.Service.csproj \
            --configuration Release \
            --runtime linux-musl-x64 \
            --no-self-contained \
            --no-restore \
            -o app/publish

      - name: Archive artifacts
        uses: actions/upload-artifact@v7
        with:
          name: published-app
          path: app/publish/
